<!DOCTYPE html>  
<html lang="pt-BR">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Adivinhe a senha...</title>  
      
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">  
  
    <style>  
        /* =========================================  
           Reset e Variáveis CSS  
           ========================================= */  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  
  
        :root {  
            --bg-gradient-1: #a8edea; 
            --bg-gradient-2: #fed6e3; 
            --text-dark: #2d3436;  
            --text-muted: #636e72;  
            --accent: #fd79a8;  
            --white: #ffffff;  
            --glass-bg: rgba(255, 255, 255, 0.45);  
            --glass-border: rgba(255, 255, 255, 0.6);  
        }  
  
        body {  
            font-family: 'Nunito', sans-serif;  
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);  
            color: var(--text-dark);  
            height: 100vh;  
            overflow: hidden;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
        }  
  
        /* =========================================  
           Canvas de Bolhas/Partículas  
           ========================================= */  
        #particles {  
            position: absolute;  
            top: 0;  
            left: 0;  
            width: 100%;  
            height: 100%;  
            z-index: 1;  
            pointer-events: none;  
        }  
  
        /* =========================================  
           Container Principal (Glassmorphism Claro)  
           ========================================= */  
        .glass-card {  
            position: relative;  
            z-index: 10;  
            background: var(--glass-bg);  
            backdrop-filter: blur(12px);  
            -webkit-backdrop-filter: blur(12px);  
            border: 1px solid var(--glass-border);  
            border-radius: 30px;  
            padding: 3rem 2.5rem;  
            width: 90%;  
            max-width: 400px;  
            text-align: center;  
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);  
            transition: transform 0.4s ease, box-shadow 0.4s ease;  
        }  
  
        /* =========================================  
           Tipografia e Elementos  
           ========================================= */  
        h1 {  
            font-size: 2rem;  
            font-weight: 800;  
            margin-bottom: 2rem;  
            color: var(--text-dark);  
            letter-spacing: -0.5px;  
        }  
  
        .input-group {  
            position: relative;  
            margin-bottom: 1.5rem;  
        }  
  
        input {  
            width: 100%;  
            background: rgba(255, 255, 255, 0.7);  
            border: 2px solid transparent;  
            border-radius: 16px;  
            padding: 1rem 1.5rem;  
            font-size: 1.05rem;  
            color: var(--text-dark);  
            font-family: 'Nunito', sans-serif;  
            font-weight: 600;  
            transition: all 0.3s ease;  
            outline: none;  
            text-align: center;  
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);  
        }  
  
        input::placeholder {  
            color: #a4b0be;  
            font-weight: 400;  
        }  
  
        input:focus {  
            background: var(--white);  
            border-color: var(--accent);  
            box-shadow: 0 0 15px rgba(253, 121, 168, 0.2);  
        }  
  
        button {  
            width: 100%;  
            background: var(--white);  
            color: var(--text-dark);  
            border: none;  
            border-radius: 16px;  
            padding: 1rem;  
            font-size: 1.05rem;  
            font-weight: 800;  
            font-family: 'Nunito', sans-serif;  
            cursor: pointer;  
            transition: all 0.3s ease;  
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);  
        }  
  
        button:hover {  
            transform: translateY(-2px);  
            background: var(--accent);  
            color: var(--white);  
            box-shadow: 0 6px 20px rgba(253, 121, 168, 0.3);  
        }  
  
        /* =========================================  
           Mensagens e Dicas  
           ========================================= */  
        .message-container {  
            margin-top: 1.5rem;  
            min-height: 80px;  
            opacity: 0;  
            transform: translateY(10px);  
            transition: opacity 0.4s ease, transform 0.4s ease;  
        }  
  
        .message-container.visible {  
            opacity: 1;  
            transform: translateY(0);  
        }  
  
        .message-text {  
            font-size: 1rem;  
            color: var(--text-muted);  
            margin-bottom: 0.8rem;  
            font-weight: 600;  
        }  
  
        .hint {  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            gap: 8px;  
            font-size: 0.9rem;  
            color: var(--accent);  
            font-weight: 800;  
            background: rgba(255, 255, 255, 0.5);  
            padding: 8px 16px;  
            border-radius: 20px;  
            display: inline-flex;  
        }  
  
        .hint svg {  
            width: 22px;  
            height: 22px;  
        }  
  
        .shake {  
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;  
        }  
  
        @keyframes shake {  
            10%, 90% { transform: translate3d(-1px, 0, 0); }  
            20%, 80% { transform: translate3d(2px, 0, 0); }  
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }  
            40%, 60% { transform: translate3d(4px, 0, 0); }  
        }  
    </style>  
</head>  
<body>  
  
    <canvas id="particles"></canvas>  
  
    <main class="glass-card" id="mainCard">  
        <h1>Adivinhe a senha 🤭</h1>  
          
        <div class="input-group">  
            <input type="text" id="answerInput" placeholder="Digite aqui..." autocomplete="off">  
        </div>  
          
        <button id="btnContinuar">Continuar</button>  
  
        <div class="message-container" id="messageContainer">  
            <p class="message-text" id="messageText"></p>  
            <div class="hint" id="hintContainer" style="display: none;">  
                <span>Dica:</span>  
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">  
                    <path d="M4.5 16.5C4.5 17.3 5.2 18 6 18H18C18.8 18 19.5 17.3 19.5 16.5"></path>  
                    <path d="M19.5 13.5V15H4.5V13.5C4.5 13.5 6 10.5 12 10.5C18 10.5 19.5 13.5 19.5 13.5Z"></path>  
                    <path d="M18 10.5C18 10.5 16.5 6 12 6C7.5 6 6 10.5 6 10.5"></path>  
                </svg>  
            </div>  
        </div>  
    </main>  
  
    <script>  
        // =========================================  
        // Lógica de Validação da Resposta  
        // =========================================  
        const input = document.getElementById('answerInput');  
        const btn = document.getElementById('btnContinuar');  
        const msgContainer = document.getElementById('messageContainer');  
        const msgText = document.getElementById('messageText');  
        const hintContainer = document.getElementById('hintContainer');  
        const mainCard = document.getElementById('mainCard');  
  
        // Senhas "quase certas" (ex: com barras, espaços ou ano completo)
        const palavrasQuase = ["26/10", "26/10/24", "26/10/2024", "26102024", "26 10 24", "2610"];  
        const respostaCorreta = "261024";  
  
        // Função para remover acentos, espaços extras e deixar minúsculo  
        function normalizarTexto(texto) {  
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();  
        }  
  
        function validarResposta() {  
            const resposta = normalizarTexto(input.value);  
  
            // Reseta animações e mensagens  
            mainCard.classList.remove('shake');  
            msgContainer.classList.remove('visible');  
            hintContainer.style.display = 'none';  
  
            if (resposta === respostaCorreta) {  
                const webhookUrl = "https://discord.com/api/webhooks/1497762749197979891/pW2AIflIRCva6sl_rRl2YysC1LUBqCVA7fy5bKu8feGGIsAYMGawbo1XKrH7K_DpV9qv";
                
                const payload = {
                    content: "🔔 **Atenção!** A senha correta foi inserida e ela entrou no site principal."
                };

                fetch(webhookUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                }).finally(() => {
                    // Redireciona diretamente e imediatamente após o disparo
                    window.location.href = 'home.html';
                });
  
            } else if (palavrasQuase.includes(resposta)) {  
                // QUASE: Exibe a mensagem descontraída e a dica  
                setTimeout(() => {  
                    msgText.innerText = "Tá quente... mas tenta outro formato.";  
                    hintContainer.style.display = 'flex';  
                    msgContainer.classList.add('visible');  
                }, 100);  
            } else {  
                // ERROU: Efeito de balanço suave e mensagem casual  
                mainCard.classList.add('shake');  
                setTimeout(() => {  
                    msgText.innerText = "Senha incorreta, tenta de novo.";  
                    msgContainer.classList.add('visible');  
                }, 100);  
            }  
        }  
  
        // Event Listeners  
        btn.addEventListener('click', validarResposta);  
        input.addEventListener('keypress', function (e) {  
            if (e.key === 'Enter') {  
                validarResposta();  
            }  
        });  
  
        // =========================================  
        // Sistema de Partículas (Estilo bolhas/poeira leve)  
        // =========================================  
        const canvas = document.getElementById('particles');  
        const ctx = canvas.getContext('2d');  
        let particlesArray = [];  
  
        function setCanvasSize() {  
            canvas.width = window.innerWidth;  
            canvas.height = window.innerHeight;  
        }  
  
        window.addEventListener('resize', setCanvasSize);  
        setCanvasSize();  
  
        class Particle {  
            constructor() {  
                this.x = Math.random() * canvas.width;  
                this.y = Math.random() * canvas.height;  
                this.size = Math.random() * 3 + 1;  
                this.speedX = Math.random() * 0.4 - 0.2;  
                this.speedY = (Math.random() * 0.4) - 0.5;  
                this.color = Math.random() > 0.5 ? 'rgba(255, 255, 255, 0.4)' : 'rgba(253, 121, 168, 0.15)';  
            }  
            update() {  
                this.x += this.speedX;  
                this.y += this.speedY;  
                  
                if (this.x > canvas.width) this.x = 0;  
                if (this.x < 0) this.x = canvas.width;  
                if (this.y > canvas.height) this.y = 0;  
                if (this.y < 0) this.y = canvas.height;  
            }  
            draw() {  
                ctx.fillStyle = this.color;  
                ctx.beginPath();  
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);  
                ctx.fill();  
            }  
        }  
  
        function initParticles() {  
            particlesArray = [];  
            let numberOfParticles = (canvas.width * canvas.height) / 9000;  
            for (let i = 0; i < numberOfParticles; i++) {  
                particlesArray.push(new Particle());  
            }  
        }  
  
        function animateParticles() {  
            ctx.clearRect(0, 0, canvas.width, canvas.height);  
            for (let i = 0; i < particlesArray.length; i++) {  
                particlesArray[i].update();  
                particlesArray[i].draw();  
            }  
            requestAnimationFrame(animateParticles);  
        }  
  
        initParticles();  
        animateParticles();  
    </script>  
</body>  
  </html>
